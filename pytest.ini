[pytest]
# This repository hosts two independent projects that share a marketplace and
# nothing else. `tests/` covers the cgel plugin. `deck-master/` is a Python
# package with its own pyproject.toml, its own dependencies and its own suite.
#
# The exclusion is not tidiness. deck-master's tests rely on the
# `pythonpath = ["src"]` set by its own pyproject.toml, and pytest reads that
# from whichever rootdir it started in -- so collecting them from here fails on
# import before a single test runs. Removing this line breaks `pytest` at the
# repository root with ten collection errors.
#
# deck-master's suite is not skipped, only run from where its configuration
# applies:
#
#     cd deck-master && python3 -m pytest tests -q
norecursedirs = deck-master .git *.egg-info __pycache__ .pytest_cache
